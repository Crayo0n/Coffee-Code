<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Coffee-Code Admin</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Panel de administración de Coffee-Code. Gestión centralizada de usuarios, roles y reportes estadísticos para la cafetería.">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

  <div class="login-card">
     <div class="login-logo">
       <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Coffee-Code Logo" class="login-logo-img">
       <h1>Bienvenido</h1>
       <span class="brand-subheading">COFFEE CODE</span>
     </div>
    
      <form id="loginForm" method="POST" action="/login">
        {% if error %}
        <div class="login-error-msg" style="color: #d9534f; background-color: rgba(217, 83, 79, 0.08); border: 1px solid #d9534f; border-radius: 12px; padding: 12px; margin-bottom: 20px; font-size: 14px; text-align: center; font-weight: 500;">
          {{ error }}
        </div>
        {% endif %}

        <div class="form-group">
          <label for="username">CORREO ELECTRÓNICO</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <input type="text" id="username" name="username" placeholder="ejemplo@coffeecode.com" required value="mau@coffeecode.com">
          </div>
        </div>

        <div class="form-group">
          <label for="password">CONTRASEÑA</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input type="password" id="password" name="password" placeholder="••••••" required value="123">
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember" checked>
            <span>Recordarme</span>
          </label>
          <a href="#" class="forgot-password" onclick="alert('Ponte en contacto con el administrador de sistemas para reestablecer tu contraseña o PIN.'); return false;">¿Olvidaste tu Contraseña?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
          Ingresar al Sistema
        </button>
      </form>
  </div>

</body>
</html>
