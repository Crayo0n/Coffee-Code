<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Cofee-Code Admin</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Panel de administración de Cofee-Code. Gestión centralizada de usuarios, roles y reportes estadísticos para la cafetería.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <!-- SVG Taza de Café Steaming Elegante -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
          <path d="M2 21h18v-2H2v2zM20 8h-2V5h2v3zm2-5H18v3h-2v5c0 2.21-1.79 4-4 4H6c-2.21 0-4-1.79-4-4V3H0v2h2v6c0 3.31 2.69 6 6 6h4c2.82 0 5.15-1.95 5.77-4.57.5-.15.95-.43 1.3-.78.58-.58.93-1.38.93-2.26V8h2c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM4 5h10v6H4V5z"/>
        </svg>
      </div>
      <h1>Cofee-Code</h1>
      <span>Administración General</span>
    </div>
    
    <div class="login-header">
      <p>Ingresa tus credenciales para acceder al panel de gestión.</p>
    </div>

    <!-- Redirige automáticamente a dashboard.html al hacer clic en Iniciar Sesión -->
    <form id="loginForm" onsubmit="window.location.href='dashboard.html'; return false;">
      <div class="form-group">
        <label for="username">Usuario o Correo</label>
        <div class="input-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <input type="text" id="username" placeholder="admin@cofeecode.com" required value="admin@cofeecode.com">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input type="password" id="password" placeholder="••••••••" required value="12345678">
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="remember" checked>
          <span>Recordarme</span>
        </label>
        <a href="#" class="forgot-password" onclick="alert('Ponte en contacto con el administrador de sistemas para reestablecer tu contraseña.'); return false;">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-login">
        <span>Iniciar Sesión</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-right"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </form>
  </div>

</body>
</html>
